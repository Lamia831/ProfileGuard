<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfileGuard | Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <nav>
        <a href="home.html" class="logo">
            <i class="fas fa-shield-halved"></i>
            <span>ProfileGuard</span>
        </a>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="auth-container">
        <div class="glass-card auth-card reveal active">
            <h2>Create Account</h2>
            <p>Join the elite circle of protected users</p>

            <form onsubmit="return handleSignup(event)">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required>
                </div>

                <button type="submit" class="btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 20px;">
                    Create Secure Account
                </button>
            </form>

            <p style="margin-top: 24px; font-size: 14px;">
                Already have an account?
                <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log In</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
